<button type="{{ type|default:'button' }}"
        class="inline-flex items-center justify-center rounded-md px-3 py-2 text-sm font-medium transition {% if variant == 'secondary' %}border border-slate-300 bg-white text-slate-700 hover:bg-slate-50{% elif variant == 'danger' %}bg-red-700 text-white hover:bg-red-800{% else %}bg-slate-900 text-white hover:bg-slate-800{% endif %}"
        {% if hx_target %}hx-target="{{ hx_target }}"{% endif %}
        {% if hx_swap %}hx-swap="{{ hx_swap }}"{% endif %}>
    {{ label }}
</button>
