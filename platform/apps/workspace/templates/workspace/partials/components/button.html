<button type="{{ type|default:'button' }}"
        class="inline-flex items-center justify-center rounded-xl px-4 py-2.5 text-sm font-semibold shadow-sm transition duration-150 focus-visible:outline-none focus-visible:ring-4 {% if variant == 'secondary' %}border border-slate-300 bg-white text-slate-700 hover:bg-slate-50 focus-visible:ring-slate-200{% elif variant == 'danger' %}bg-red-700 text-white hover:bg-red-800 focus-visible:ring-red-200{% else %}bg-slate-950 text-white hover:-translate-y-0.5 hover:bg-slate-800 focus-visible:ring-slate-300{% endif %}"
        {% if hx_target %}hx-target="{{ hx_target }}"{% endif %}
        {% if hx_swap %}hx-swap="{{ hx_swap }}"{% endif %}>
    {{ label }}
</button>
