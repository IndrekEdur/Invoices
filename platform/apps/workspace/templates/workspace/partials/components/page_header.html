<div class="flex flex-col gap-3 border-b border-slate-200 pb-5 md:flex-row md:items-end md:justify-between">
    <div>
        {% if eyebrow %}<div class="text-xs font-semibold uppercase tracking-wide text-slate-500">{{ eyebrow }}</div>{% endif %}
        <h1 class="mt-1 text-2xl font-semibold text-slate-950">{{ title }}</h1>
        {% if body %}<p class="mt-2 max-w-3xl text-sm text-slate-600">{{ body }}</p>{% endif %}
    </div>
    {% if action_label %}
        {% include "workspace/partials/components/button.html" with label=action_label %}
    {% endif %}
</div>
