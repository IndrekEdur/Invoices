{% if rows %}
    <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200 text-sm">
                <thead class="sticky top-0 bg-slate-50">
                    <tr>
                        {% for header in headers %}
                            <th class="px-5 py-3.5 text-left text-xs font-semibold uppercase tracking-wide text-slate-600">{{ header }}</th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    {% for row in rows %}
                        <tr class="odd:bg-white even:bg-slate-50/50 transition hover:bg-blue-50/60">
                            {% for cell in row %}
                                <td class="px-5 py-4 text-slate-700">{{ cell }}</td>
                            {% endfor %}
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% else %}
    {% include "workspace/partials/components/empty_state.html" with icon="0" title=empty_title body=empty_body %}
{% endif %}
