<article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition duration-150 hover:-translate-y-0.5 hover:shadow-md" {% if component_id %}id="{{ component_id }}"{% endif %}>
    {% if eyebrow %}<div class="text-xs font-semibold uppercase tracking-wide text-slate-500">{{ eyebrow }}</div>{% endif %}
    <h3 class="mt-1 text-base font-semibold tracking-tight text-slate-950">{{ title }}</h3>
    {% if body %}<p class="mt-2 text-sm leading-6 text-slate-600">{{ body }}</p>{% endif %}
</article>
