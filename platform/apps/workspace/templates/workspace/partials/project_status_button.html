<form method="post" action="{% url 'workspace:project_status' project.id %}" class="rounded-xl border border-slate-200 bg-slate-50 p-3">
    {% csrf_token %}
    <input type="hidden" name="new_status" value="{{ new_status }}">
    <label class="text-xs font-semibold uppercase tracking-wide text-slate-500" for="reason-{{ new_status }}">Reason</label>
    <textarea id="reason-{{ new_status }}" name="reason" rows="2" class="mt-2 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-500 focus:ring-4 focus:ring-slate-200" placeholder="Optional audit reason"></textarea>
    <button type="submit" class="mt-3 inline-flex items-center justify-center rounded-xl {% if tone == 'success' %}bg-green-700 hover:bg-green-800 focus-visible:ring-green-200{% elif tone == 'info' %}bg-blue-700 hover:bg-blue-800 focus-visible:ring-blue-200{% else %}bg-slate-950 hover:bg-slate-800 focus-visible:ring-slate-300{% endif %} px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5 focus-visible:outline-none focus-visible:ring-4">
        {{ label }}
    </button>
</form>
