<article id="{{ target }}" class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm" hx-target="this" hx-swap="outerHTML">
    <div class="flex items-start justify-between gap-4">
        <div>
            <div class="text-sm font-medium text-slate-500">{{ title }}</div>
            <div class="mt-3 text-3xl font-semibold text-slate-950">{{ count }}</div>
        </div>
        <div class="flex h-10 w-10 items-center justify-center rounded-md bg-slate-100 text-sm font-semibold text-slate-700">{{ icon }}</div>
    </div>
    <div class="mt-4 text-xs text-slate-500">Future HTMX target: #{{ target }}</div>
</article>
