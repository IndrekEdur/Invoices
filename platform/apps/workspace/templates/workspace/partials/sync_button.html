<form method="post" action="{% url 'workspace:inbox_sync' %}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next_url }}">
    <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition duration-150 hover:-translate-y-0.5 hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-4 focus-visible:ring-slate-300">
        Sync now
    </button>
</form>
