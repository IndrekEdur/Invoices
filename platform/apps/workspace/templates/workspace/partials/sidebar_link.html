{% url url_name as item_url %}
<a href="{{ item_url }}"
   class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium {% if current_section == section %}bg-amber-400 text-slate-950{% else %}text-slate-200 hover:bg-slate-800 hover:text-white{% endif %}">
    <span class="flex h-7 w-7 items-center justify-center rounded bg-white/10 text-xs font-semibold">{{ icon }}</span>
    <span>{{ label }}</span>
</a>
