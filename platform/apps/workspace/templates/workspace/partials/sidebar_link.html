{% url url_name as item_url %}
<a href="{{ item_url }}"
   class="group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium outline-none transition duration-150 focus-visible:ring-2 focus-visible:ring-amber-300 {% if current_section == section %}bg-amber-400 text-slate-950 shadow-sm{% else %}text-slate-300 hover:bg-slate-800/90 hover:text-white{% endif %}"
   {% if current_section == section %}aria-current="page"{% endif %}>
    <span class="flex h-9 w-9 items-center justify-center rounded-lg transition {% if current_section == section %}bg-slate-950/10 text-slate-950{% else %}bg-white/5 text-slate-300 group-hover:bg-white/10 group-hover:text-white{% endif %}">
        {% include "workspace/partials/icon.html" with name=icon class="h-5 w-5" %}
    </span>
    <span>{{ label }}</span>
</a>
